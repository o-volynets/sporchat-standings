<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportchat Predict — Адмінка результатів</title>
  <style>
    :root{--bg:#0f172a;--card:#111827;--card2:#1f2937;--text:#f9fafb;--muted:#9ca3af;--line:rgba(255,255,255,.12);--danger:#f87171;--success:#34d399}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(34,197,94,.13),transparent 32%),radial-gradient(circle at bottom right,rgba(56,189,248,.14),transparent 32%),var(--bg);color:var(--text)}
    .page{width:min(980px,calc(100% - 32px));margin:0 auto;padding:32px 0 56px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:24px}
    h1{margin:0;font-size:clamp(28px,4vw,46px);letter-spacing:-.04em}.subtitle{margin:8px 0 0;color:var(--muted);font-size:16px}
    .card{border:1px solid var(--line);background:rgba(17,24,39,.9);border-radius:22px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.25);margin-bottom:22px}
    .card-header{padding:18px 22px;border-bottom:1px solid var(--line);background:rgba(31,41,55,.65);font-weight:900;font-size:20px}.card-body{padding:22px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px} label{display:block;margin-bottom:8px;color:var(--muted);font-weight:800;font-size:14px}
    input,select{width:100%;border:1px solid var(--line);background:rgba(15,23,42,.8);color:var(--text);border-radius:14px;padding:14px 16px;font-size:16px;outline:none}
    input:focus,select:focus{border-color:rgba(34,197,94,.7)} button{border:1px solid var(--line);border-radius:999px;padding:13px 18px;font-weight:900;color:#fff;cursor:pointer;background:rgba(15,23,42,.75)}
    .primary{background:linear-gradient(135deg,#06b6d4,#22c55e);border:0;min-width:180px}.actions{margin-top:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .status{margin-top:14px;font-weight:700;color:var(--muted)}.status.error{color:var(--danger)}.status.success{color:var(--success)}.hidden{display:none!important}
    .current-result{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.5}.note{color:var(--muted);font-size:13px;line-height:1.5;margin-top:18px} code{color:#93c5fd}
    @media(max-width:760px){.grid{grid-template-columns:1fr}.top{flex-direction:column}}
  </style>
</head>
<body>
  <main class="page">
    <section class="top"><div><h1>Адмінка результатів</h1><p class="subtitle">Внесення реальних рахунків матчів для Sportchat Predict</p></div><button id="logout-button" class="hidden" type="button">Вийти</button></section>
    <section id="login-card" class="card"><div class="card-header">Вхід</div><div class="card-body"><div class="grid"><div><label for="username">Логін</label><input id="username" autocomplete="username"/></div><div><label for="password">Пароль</label><input id="password" type="password" autocomplete="current-password"/></div></div><div class="actions"><button id="login-button" class="primary" type="button">Увійти</button></div><div id="login-status" class="status"></div></div></section>
    <section id="admin-card" class="card hidden"><div class="card-header">Оновити реальний результат</div><div class="card-body"><div class="grid"><div><label for="match-select">Матч</label><select id="match-select"><option value="">Завантаження матчів...</option></select><div id="current-result" class="current-result"></div></div><div><label for="score-input">Реальний рахунок</label><input id="score-input" placeholder="2-1" inputmode="text" pattern="[0-9]+-[0-9]+" maxlength="5"/></div><div><label for="multiplier-input">Коефіцієнт підрахунку</label><select id="multiplier-input"><option value="1">1 — груповий етап</option><option value="1.2">1.2 — 1/16</option><option value="1.4">1.4 — 1/8</option><option value="1.6">1.6 — 1/4</option><option value="1.8">1.8 — 1/2 / матч за 3 місце</option><option value="2">2 — фінал</option></select><div class="note">Для плей-офф вибери коефіцієнт зі списку. Рахунок у плей-офф — тільки за 90 хвилин.</div></div></div><div class="actions"><button id="save-button" class="primary" type="button">Оновити результат</button><button id="refresh-button" type="button">Оновити список матчів</button></div><div id="admin-status" class="status"></div></div></section>
    <p class="note">Сторінка прихована з меню. Відкривай її напряму: <code>/admin-results.html</code>.</p>
  </main>
  <script>
    const TOKEN_KEY='sportchat_admin_token';
    const loginCard=document.getElementById('login-card'), adminCard=document.getElementById('admin-card'), logoutButton=document.getElementById('logout-button');
    const loginStatus=document.getElementById('login-status'), adminStatus=document.getElementById('admin-status'), matchSelect=document.getElementById('match-select'), currentResult=document.getElementById('current-result');
    let matches=[];
    function setStatus(el,msg,type){el.textContent=msg||'';el.className='status'+(type?' '+type:'')}
    function getToken(){return sessionStorage.getItem(TOKEN_KEY)} function setToken(t){sessionStorage.setItem(TOKEN_KEY,t)} function clearToken(){sessionStorage.removeItem(TOKEN_KEY)}
    function showAdmin(){loginCard.classList.add('hidden');adminCard.classList.remove('hidden');logoutButton.classList.remove('hidden');loadMatches()} function showLogin(){loginCard.classList.remove('hidden');adminCard.classList.add('hidden');logoutButton.classList.add('hidden')}
    async function apiFetch(url,options={}){const token=getToken();const response=await fetch(url,{...options,headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{}),...(options.headers||{})}});const data=await response.json();if(!response.ok||data.ok===false)throw new Error(data.error||'Помилка запиту');return data}
    async function login(){setStatus(loginStatus,'Перевіряю логін...','');try{const username=document.getElementById('username').value.trim();const password=document.getElementById('password').value;const data=await apiFetch('/.netlify/functions/admin-login',{method:'POST',body:JSON.stringify({username,password})});setToken(data.token);setStatus(loginStatus,'','');showAdmin()}catch(e){setStatus(loginStatus,e.message,'error')}}
    function formatDate(v){if(!v)return'Дата не вказана';return new Intl.DateTimeFormat('uk-UA',{timeZone:'Europe/Kyiv',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date(v))}
    function formatResult(i){const meta=[];if(i.stage)meta.push('Стадія: '+i.stage);if(i.playoffMultiplier)meta.push('Коефіцієнт: '+i.playoffMultiplier);const prefix=meta.length?meta.join(' · ')+' · ':'';if(i.homeScore===null||i.homeScore===undefined||i.awayScore===null||i.awayScore===undefined)return prefix+'Результат ще не внесено';return `${prefix}Поточний результат: ${i.homeScore}-${i.awayScore} (${i.result||''})`}
    async function loadMatches(){setStatus(adminStatus,'Завантажую матчі...','');try{const data=await apiFetch('/.netlify/functions/admin-matches');matches=data.data||[];matchSelect.innerHTML='<option value="">Обери матч</option>';matches.forEach(item=>{const o=document.createElement('option');o.value=item.match;o.textContent=`${formatDate(item.startsAt)} — ${item.match}`;matchSelect.appendChild(o)});setStatus(adminStatus,'Матчі завантажено.','success');updateCurrentResult()}catch(e){if(e.message.includes('token')||e.message.includes('session')||e.message.includes('Authorization')){clearToken();showLogin()}setStatus(adminStatus,e.message,'error')}}
    function updateCurrentResult(){const item=matches.find(m=>m.match===matchSelect.value);currentResult.textContent=item?formatResult(item):'';if(item&&item.playoffMultiplier){const select=document.getElementById('multiplier-input');const value=String(Number(item.playoffMultiplier));if([...select.options].some(o=>o.value===value))select.value=value;}}
    async function saveResult(){setStatus(adminStatus,'Зберігаю результат...','');try{const match=matchSelect.value;const score=document.getElementById('score-input').value.trim();const playoffMultiplier=Number(document.getElementById('multiplier-input').value||1);const data=await apiFetch('/.netlify/functions/update-result',{method:'POST',body:JSON.stringify({match,score,playoffMultiplier})});setStatus(adminStatus,data.message||'Результат оновлено.','success');document.getElementById('score-input').value='';await loadMatches()}catch(e){setStatus(adminStatus,e.message,'error')}}
    document.getElementById('login-button').addEventListener('click',login);document.getElementById('save-button').addEventListener('click',saveResult);document.getElementById('refresh-button').addEventListener('click',loadMatches);matchSelect.addEventListener('change',updateCurrentResult);logoutButton.addEventListener('click',()=>{clearToken();showLogin()});document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
    if(getToken())showAdmin();else showLogin();
  </script>
</body>
</html>
