<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sportchat Predict — Особистий кабінет</title>
  <style>
    :root{--bg:#0f172a;--card:#111827;--card2:#1f2937;--text:#f9fafb;--muted:#9ca3af;--line:rgba(255,255,255,.12);--success:#34d399;--danger:#f87171;--warning:#facc15}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(56,189,248,.18),transparent 30%),radial-gradient(circle at bottom right,rgba(34,197,94,.12),transparent 28%),var(--bg);color:var(--text)}
    .page{width:min(1100px,calc(100% - 32px));margin:0 auto;padding:32px 0 48px}.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:20px}
    h1{margin:0;font-size:clamp(28px,4vw,48px);line-height:1.05;letter-spacing:-.04em}.subtitle{margin:8px 0 0;color:var(--muted);font-size:16px}
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 22px}.nav-link{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border:1px solid var(--line);border-radius:999px;color:var(--text);text-decoration:none;font-weight:800;background:rgba(15,23,42,.65)}
    .nav-link.active{background:linear-gradient(135deg,#06b6d4,#22c55e);border:0}.card{border:1px solid var(--line);background:rgba(17,24,39,.9);border-radius:22px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.25);margin-bottom:22px}.card-header{padding:18px 22px;border-bottom:1px solid var(--line);background:rgba(31,41,55,.65);font-weight:900;font-size:20px}.card-body{padding:22px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}label{display:block;margin-bottom:8px;color:var(--muted);font-weight:800;font-size:14px}
    select,input{width:100%;border:1px solid var(--line);background:rgba(15,23,42,.8);color:var(--text);border-radius:14px;padding:14px 16px;font-size:16px;outline:none}
    select:focus,input:focus{border-color:rgba(56,189,248,.7)}input:disabled,select:disabled{opacity:.65;cursor:not-allowed}.actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:18px}
    button{border:1px solid var(--line);border-radius:999px;padding:13px 18px;font-weight:900;color:#fff;cursor:pointer;background:rgba(15,23,42,.75)}button:disabled{opacity:.55;cursor:not-allowed}.primary{background:linear-gradient(135deg,#06b6d4,#22c55e);border:0;min-width:180px}
    .status{margin-top:14px;font-weight:700;color:var(--muted)}.status.error{color:var(--danger)}.status.success{color:var(--success)}.status.warning{color:var(--warning)}
    .info-box{margin-top:18px;padding:16px;border:1px solid var(--line);border-radius:16px;background:rgba(15,23,42,.55);color:var(--muted);line-height:1.5}.score-big{font-size:30px;font-weight:950;color:var(--text);margin:8px 0}.hidden{display:none!important}
    .user-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:10px 14px;background:rgba(15,23,42,.65);font-weight:800}
    @media(max-width:760px){.hero{flex-direction:column;align-items:stretch}.grid{grid-template-columns:1fr}.page{width:min(100% - 20px,1100px);padding-top:20px}.nav-link{flex:1}}
  </style>
</head>
<body>
  <main class="page">
    <section class="hero"><div><h1>Особистий кабінет</h1><p class="subtitle">Перегляд і редагування твоїх прогнозів до старту матчу</p></div><button id="logout-button" class="hidden" type="button">Вийти</button></section>
    <nav class="nav"><a class="nav-link" href="index.html">Рейтинг</a><a class="nav-link" href="predictions.html">Не зроблені прогнози</a><a class="nav-link active" href="personal-cabinet.html">Особистий кабінет</a><a class="nav-link" href="admin-results.html">Адмінка</a></nav>

    <section id="login-card" class="card">
      <div class="card-header">Вхід гравця</div>
      <div class="card-body">
        <div class="grid">
          <div><label for="username">Логін</label><input id="username" autocomplete="username" /></div>
          <div><label for="password">Пароль</label><input id="password" type="password" autocomplete="current-password" /></div>
        </div>
        <div class="actions"><button id="login-button" class="primary" type="button">Увійти</button></div>
        <div id="login-status" class="status"></div>
      </div>
    </section>

    <section id="cabinet-card" class="card hidden">
      <div class="card-header">Мої прогнози <span id="player-name" class="user-pill"></span></div>
      <div class="card-body">
        <div class="grid">
          <div><label for="match-select">Матч</label><select id="match-select"><option value="">Завантаження...</option></select></div>
          <div><label for="score-input">Рахунок</label><input id="score-input" placeholder="2-1" inputmode="text" pattern="[0-9]+-[0-9]+" maxlength="5" disabled /></div>
        </div>
        <div id="prediction-info" class="info-box hidden"></div>
        <div class="actions"><button id="save-button" class="primary" type="button" disabled>Зберегти прогноз</button><button id="refresh-button" type="button">Оновити</button></div>
        <div id="status" class="status"></div>
      </div>
    </section>
  </main>

  <script>
    const TOKEN_KEY='sportchat_player_token'; const PLAYER_KEY='sportchat_player_name';
    const loginCard=document.getElementById('login-card'), cabinetCard=document.getElementById('cabinet-card'), logoutButton=document.getElementById('logout-button');
    const loginStatus=document.getElementById('login-status'), statusEl=document.getElementById('status'), matchSelect=document.getElementById('match-select'), scoreInput=document.getElementById('score-input'), saveButton=document.getElementById('save-button'), refreshButton=document.getElementById('refresh-button'), predictionInfo=document.getElementById('prediction-info'), playerName=document.getElementById('player-name');
    let cabinetRows=[];
    function token(){return sessionStorage.getItem(TOKEN_KEY)} function setToken(t,p){sessionStorage.setItem(TOKEN_KEY,t);sessionStorage.setItem(PLAYER_KEY,p)} function clearToken(){sessionStorage.removeItem(TOKEN_KEY);sessionStorage.removeItem(PLAYER_KEY)}
    function setStatus(el,msg,type){el.textContent=msg||'';el.className='status'+(type?' '+type:'')}
    function showLogin(){loginCard.classList.remove('hidden');cabinetCard.classList.add('hidden');logoutButton.classList.add('hidden')}
    function showCabinet(){loginCard.classList.add('hidden');cabinetCard.classList.remove('hidden');logoutButton.classList.remove('hidden');playerName.textContent=sessionStorage.getItem(PLAYER_KEY)||'';loadCabinet()}
    async function apiFetch(url,options={}){const response=await fetch(url,{...options,headers:{'Content-Type':'application/json',...(token()?{Authorization:'Bearer '+token()}:{}),...(options.headers||{})}});const data=await response.json();if(!response.ok||data.ok===false)throw new Error(data.error||'Помилка запиту');return data}
    async function login(){setStatus(loginStatus,'Перевіряю логін...','');try{const username=document.getElementById('username').value.trim();const password=document.getElementById('password').value;const data=await apiFetch('/.netlify/functions/player-login',{method:'POST',body:JSON.stringify({username,password})});setToken(data.token,data.player);showCabinet()}catch(e){setStatus(loginStatus,e.message,'error')}}
    function formatDate(v){if(!v)return'Дата не вказана';return new Intl.DateTimeFormat('uk-UA',{timeZone:'Europe/Kyiv',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date(v))}
    function row(){return cabinetRows.find(r=>r.match===matchSelect.value)}
    async function loadCabinet(){setStatus(statusEl,'Завантажую кабінет...','');try{const data=await apiFetch('/.netlify/functions/player-cabinet');cabinetRows=data.data||[];matchSelect.innerHTML='<option value="">Обери матч</option>';cabinetRows.forEach(r=>{const o=document.createElement('option');o.value=r.match;const flags=[];if(r.hasPrediction)flags.push('є прогноз');if(!r.editable)flags.push('матч почався');o.textContent=`${formatDate(r.startsAt)} — ${r.match}${flags.length?' · '+flags.join(', '):''}`;matchSelect.appendChild(o)});setStatus(statusEl,'Дані завантажено.','success');updateSelectedMatch()}catch(e){if(e.message.includes('token')||e.message.includes('session')||e.message.includes('Authorization')){clearToken();showLogin()}setStatus(statusEl,e.message,'error')}}
    function updateSelectedMatch(){const r=row();scoreInput.value='';scoreInput.disabled=true;saveButton.disabled=true;predictionInfo.classList.add('hidden');if(!r)return;predictionInfo.classList.remove('hidden');const existing=r.hasPrediction?`<div>Твій поточний прогноз:</div><div class="score-big">${r.score}</div>`:'<div>На цей матч ще немає прогнозу.</div>';const edit=r.editable?'<div>Матч ще не почався — прогноз можна додати або змінити.</div>':'<div>Матч уже почався — прогноз доступний тільки для перегляду, редагування заблоковано.</div>';predictionInfo.innerHTML=`${existing}<div>Початок: ${formatDate(r.startsAt)}</div>${edit}`;if(r.hasPrediction)scoreInput.value=r.score||'';if(r.editable){scoreInput.disabled=false;saveButton.disabled=false}}
    async function savePrediction(){const r=row();const score=scoreInput.value.trim();if(!r){setStatus(statusEl,'Обери матч.','error');return}if(!/^\d+\s*-\s*\d+$/.test(score)){setStatus(statusEl,'Рахунок має бути у форматі 0-0, 2-1, 4-3.','error');return}if(!r.editable){setStatus(statusEl,'Матч уже почався, редагування заблоковано.','error');return}setStatus(statusEl,'Зберігаю прогноз...','');try{const result=await apiFetch('/.netlify/functions/submit-prediction',{method:'POST',body:JSON.stringify({match:r.match,score})});setStatus(statusEl,result.message||'Прогноз збережено.','success');await loadCabinet();matchSelect.value=r.match;updateSelectedMatch()}catch(e){setStatus(statusEl,e.message,'error')}}
    document.getElementById('login-button').addEventListener('click',login);document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login()});logoutButton.addEventListener('click',()=>{clearToken();showLogin()});matchSelect.addEventListener('change',updateSelectedMatch);saveButton.addEventListener('click',savePrediction);refreshButton.addEventListener('click',loadCabinet);
    if(token())showCabinet();else showLogin();
  </script>
</body>
</html>
